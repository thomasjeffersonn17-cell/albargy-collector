<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL BARQY Collector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0A0A; color: #fff; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .text-gold { color: #D4AF37; }
        .bg-gold { background-color: #D4AF37; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-6">

    <div class="text-center space-y-6">
        <!-- Logo Area -->
        <h1 class="font-luxury text-6xl md:text-8xl text-gold tracking-widest">AL BARQY</h1>
        
        <!-- Slogan -->
        <p class="text-xl md:text-2xl tracking-[0.3em] uppercase text-white/80">A Journey of Scent & Collection</p>
        
        <!-- Tombol Awal -->
        <div class="pt-8">
            <button class="px-10 py-4 bg-gold text-black font-bold rounded-full hover:bg-yellow-500 transition shadow-[0_0_20px_rgba(212,175,55,0.4)]">
                START YOUR JOURNEY
            </button>
        </div>
        
        <!-- Footer kecil -->
        <p class="text-sm text-gray-600 pt-12">© 2026 AL BARQY. All rights reserved.</p>
    </div>

</body>
</html>
