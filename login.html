<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AL BARQY Collector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0A0A; color: #fff; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .text-gold { color: #D4AF37; }
        .bg-gold { background-color: #D4AF37; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-6">

    <div class="bg-[#121212] p-10 rounded-2xl border border-gold/20 w-full max-w-md shadow-2xl">
        <h1 class="font-luxury text-3xl text-gold text-center mb-8">Masuk ke Koleksi</h1>
        
        <div class="space-y-4">
            <input type="text" placeholder="Username" class="w-full p-3 bg-black border border-gray-700 rounded-lg text-white focus:border-gold outline-none">
            <input type="password" placeholder="Password" class="w-full p-3 bg-black border border-gray-700 rounded-lg text-white focus:border-gold outline-none">
            
            <button class="w-full py-3 bg-gold text-black font-bold rounded-lg hover:bg-yellow-500 transition">
                LOGIN
            </button>
        </div>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-gray-400 hover:text-gold text-sm">Kembali ke Home</a>
        </div>
    </div>

</body>
</html>
