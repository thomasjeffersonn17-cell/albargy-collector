<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - AL BARQY Collector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0A0A; color: #fff; }
        .font-luxury { font-family: 'Cinzel', serif; }
        .text-gold { color: #D4AF37; }
        .bg-gold { background-color: #D4AF37; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-6">

    <div class="bg-[#121212] p-10 rounded-2xl border border-gold/20 w-full max-w-md shadow-2xl relative">
        
        <!-- Tombol Logout di pojok -->
        <a href="index.html" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-sm">Logout</a>

        <h1 class="font-luxury text-3xl text-gold text-center mb-2">Koleksi Saya</h1>
        <p class="text-center text-gray-400 text-sm mb-8">Selamat datang, ScentHunter!</p>

        <!-- Ringkasan Stats -->
        <div class="grid grid-cols-2 gap-4 mb-8 text-center">
            <div class="bg-black/50 p-4 rounded-lg border border-white/10">
                <p class="text-xs text-gray-400 uppercase">Level</p>
                <p class="text-lg font-luxury text-gold">Bronze</p>
            </div>
            <div class="bg-black/50 p-4 rounded-lg border border-white/10">
                <p class="text-xs text-gray-400 uppercase">Total Poin</p>
                <p class="text-lg font-luxury text-gold">18</p>
            </div>
        </div>

        <!-- Daftar Badge/Achievement -->
        <h2 class="text-sm uppercase tracking-widest text-gray-300 mb-4 border-b border-white/10 pb-2">Achievement</h2>
        <div class="flex flex-wrap gap-3 mb-8">
            <span class="px-3 py-1 bg-gold/20 border border-gold/40 text-gold text-xs rounded-full">🏆 Founder Collector</span>
            <span class="px-3 py-1 bg-gold/20 border border-gold/40 text-gold text-xs rounded-full">⭐ Season 1 Owner</span>
        </div>

        <!-- List Koleksi Produk -->
        <h2 class="text-sm uppercase tracking-widest text-gray-300 mb-4 border-b border-white/10 pb-2">Dimiliki</h2>
        <div class="space-y-3 text-sm text-gray-300">
            <div class="flex justify-between items-center bg-black/30 p-3 rounded-lg border border-white/5">
                <span>🌿 Sweet Vanilla (S1)</span>
                <span class="text-gold text-xs">✅ Verified</span>
            </div>
        </div>

        <div class="mt-8 text-center">
            <a href="index.html" class="text-gray-400 hover:text-gold text-sm">Kembali ke Home</a>
        </div>
    </div>

</body>
</html>
